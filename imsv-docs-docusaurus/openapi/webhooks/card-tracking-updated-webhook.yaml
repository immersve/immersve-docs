tags: [ cards ]
summary: Card Tracking Updated
operationId: card-tracking-updated
description: Triggered when shipment tracking information for a card is updated.
requestBody:
  content:
    application/json:
      schema:
        allOf:
          - type: object
            properties:
              topic:
                type: string
                enum: ["card-tracking-updated"]
              payload:
                type: object
                properties:
                  cardId:
                    type: string
                    example: "0485464bedfde163eace0ece2e3e2d75"
                    description: |
                      Identifier of the card.
                  cardholderAccountId:
                    type: string
                    example: "992b1b0f0cb8cca355c70ce08150a20d"
                    description: |
                      The Immersve cardholder's account ID.
                  shipmentTrackingUrl:
                    type: string
                    example: "https://www.dhl.com/en/express/tracking.html?AWB=123456789"
                    description: |
                      URL to track the shipment of the card.

          - $ref: "./webhook-envelope.yaml"
