tags: [ cards ]
summary: Card Activated
operationId: card-activated
description: Triggered when a card is activated for a cardholder.
requestBody:
  content:
    application/json:
      schema:
        allOf:
          - type: object
            properties:
              topic:
                type: string
                enum: ["card-activated"]
              payload:
                type: object
                properties:
                  cardholderAccountId:
                    type: string
                    example: "992b1b0f0cb8cca355c70ce08150a20d"
                    description: |
                      The Immersve cardholder's account id.
                  cardId:
                    type: string
                    example: "0485464bedfde163eace0ece2e3e2d75"
                    description: |
                      Identifier of the card.

          - $ref: "./webhook-envelope.yaml"
