tags: [ cards ]
summary: Card Block Created
operationId: card-block-created
description: |
  Triggered when a card is blocked/frozen.
requestBody:
  content:
    application/json:
      schema:
        allOf:
          - type: object
            properties:
              topic:
                type: string
                enum: ["card-block-created"]
              payload:
                type: object
                properties:
                  blockId:
                    type: string
                    example: "af2d8ce3c7c691a45dc6c0172f66a184"
                    description: |
                      Identifier of the block.

                  cardId:
                    type: string
                    example: "0485464bedfde163eace0ece2e3e2d75"
                    description: |
                      Identifier of the card being blocked.

                  cardholderAccountId:
                    type: string
                    example: "992b1b0f0cb8cca355c70ce08150a20d"
                    description: |
                      The Immersve cardholder's account id.

                  unfreezeAllowed:
                    type: boolean
                    example: true
                    description: |
                      Indicates whether the card can be unfrozen with the unfreeze endpoint

          - $ref: './webhook-envelope.yaml'
