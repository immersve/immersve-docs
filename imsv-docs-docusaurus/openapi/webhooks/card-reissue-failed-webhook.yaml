tags: [ cards ]
summary: Card Reissue Failed
operationId: card-reissue-failed
description: Triggered when a card reissuance attempt fails.
requestBody:
  content:
    application/json:
      schema:
        allOf:
          - type: object
            properties:
              topic:
                type: string
                enum: ["card-reissue-failed"]
              payload:
                type: object
                properties:
                  cardholderAccountId:
                    type: string
                    example: "992b1b0f0cb8cca355c70ce08150a20d"
                    description: |
                      The Immersve cardholder's account ID.
                  cardId:
                    type: string
                    example: "0485464bedfde163eace0ece2e3e2d75"
                    description: |
                      ID of the card that was to be reissued.
                  reissuanceType:
                    type: string
                    example: "standard-renewal"
                    description: |
                      The type of reissuance that was attempted.
                    enum:
                      - standard-renewal

          - $ref: "./webhook-envelope.yaml"
