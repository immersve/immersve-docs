tags: [ reports ]
summary: Report Download
operationId: report-download
description: |
  Triggered when a report becomes available for download via its corresponding api.
requestBody:
  content:
    application/json:
      schema:
        allOf:
          - type: object
            properties:
              topic:
                type: string
                enum: ["report-download"]
              payload:
                type: object
                properties:
                  reportType:
                    type: string
                    enum: ["payment", "funding"]
                    description: |
                      The type of report generated.
                  timeframe:
                    type: string
                    enum: ["daily", "monthly"]
                    description: |
                      The timeframe the report is generated over.

          - $ref: './webhook-envelope.yaml'
