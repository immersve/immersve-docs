tags: [ reports ]
summary: Report Updated
operationId: report-updated
description: |
  Triggered when a report is updated throughout its lifecycle.

requestBody:
  content:
    application/json:
      schema:
        allOf:
          - type: object
            properties:
              topic:
                type: string
                enum: [report-updated]
              payload:
                type: object
                required:
                  - event
                  - report
                properties:
                  event:
                    type: object
                    required:
                      - type
                      - createdAt
                    properties:
                      type:
                        type: string
                        enum:
                          - report-scheduled
                          - report-completed
                          - report-failed
                        description: |
                          The reporting lifecycle event which triggered the webhook event.
                      createdAt:
                        type: string
                        format: date-time
                        example: "2026-01-06T10:15:31Z"
                        description: |
                          ISO 8601 timestamp of when the event occurred.
                  report:
                    type: object
                    required:
                      - type
                      - id
                    properties:
                      type:
                        type: string
                        enum:
                          - funding-source-interactions-daily
                          - funding-source-interactions-monthly
                          - payments-daily
                          - payments-monthly
                        description: |
                          The type of report being generated.
                      id:
                        type: string
                        description: |
                          Identifier of the report.
                        example: report-1234

          - $ref: './webhook-envelope.yaml'
