tags: [ cards ]
summary: Card Canceled
operationId: card-canceled
description: Triggered when a card is canceled for a cardholder.
requestBody:
  content:
    application/json:
      schema:
        allOf:
          - type: object
            properties:
              topic:
                type: string
                enum: ["card-canceled"]
              payload:
                type: object
                properties:
                  cardholderAccountId:
                    type: string
                    example: "992b1b0f0cb8cca355c70ce08150a20d"
                    description: |
                      The Immersve cardholder's account id.
                  cardId:
                    type: string
                    example: "0485464bedfde163eace0ece2e3e2d75"
                    description: |
                      Identifier of the card.
                  cancelReason:
                    type: string
                    description: Reason why the card was cancelled
                    enum:
                      - provisioning-failed
                      - user-requested
                      - external-provider-failed
                      - expired
                      - reissued

          - $ref: "./webhook-envelope.yaml"
