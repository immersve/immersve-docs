post:
  tags:
    - payments
  summary: Submit 3DS Challenge Outcome
  operationId: submit-3ds-challenge-outcome
  description: |
    Submit the outcome of a 3DS Strong Customer Authentication (SCA) challenge.
    Call this endpoint after presenting the cardholder with the challenge received
    via the [Payment 3DS SCA Challenge](/api-reference/webhook-topics/payment-3-ds-sca-challenge/) webhook,
    to approve or decline the transaction on their behalf.
  parameters:
    - name: accountId
      in: path
      description: The Immersve id for the cardholder associated with the card.
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - outcome
            - id
            - authType
            - authScope
            - authenticatedAt
            - dynamicLinkingConfirmed
            - confirmedTransactionDetails
            - metadata
          properties:
            id:
              type: string
              description: |
                The Immersve identifier for the 3DS transaction. Corresponds to the
                `id` field in the [Payment 3DS SCA Challenge](/api-reference/webhook-topics/payment-3-ds-sca-challenge/) webhook payload.
              example: "6d8ebff23fe6fcf25d8a1d9dab909e54"
            outcome:
              type: string
              description: |
                The cardholder's response to the SCA challenge.
              enum:
                - approved
                - declined
            authType:
              type: string
              description: |
                The authentication method used by the cardholder.
              enum:
                - pin
                - face-id
                - fingerprint
                - device-passcode
            authenticatedAt:
              type: string
              format: date-time
              description: |
                The timestamp when the cardholder completed authentication in UTC.
              example: "2024-01-01T12:00:00Z"
            dynamicLinkingConfirmed:
              type: boolean
              description: |
                Confirms that the merchant name, amount, and currency were
                displayed to the cardholder before authentication was
                performed.
            confirmedTransactionDetails:
              type: object
              description: |
                The transaction details that were confirmed to the cardholder
                before authentication was performed.
              properties:
                amount:
                  type: integer
                  description: The transaction amount in minor units.
                  example: 5000
                currency:
                  type: string
                  description: The three-letter ISO currency code for the transaction.
                  example: "USD"
                merchantName:
                  type: string
                  description: The name of the merchant as displayed to the cardholder during authentication.
                  example: "Immersve Store"
            metadata:
              type: object
              description: |
                Additional context about the client and device used during authentication.
              properties:
                clientName:
                  type: string
                  description: The name of the client application.
                  example: "Immersve App"
                deviceId:
                  type: string
                  description: |
                    A stable, platform-native identifier for the cardholder's
                    device. Should be consistent across sessions and recognisable
                    to the cardholder.
                  example: "FBDDF7E1-7A11-4D4E-9C9B-3D8E5C2F1A4B"
                deviceName:
                  type: string
                  description: The name of the cardholder's device.
                  example: "Bob's iPhone"
                deviceModel:
                  type: string
                  description: The model identifier of the cardholder's device.
                  example: "SM-S942"
                deviceManufacturer:
                  type: string
                  description: The manufacturer of the cardholder's device.
                  example: "Samsung"
                ipAddress:
                  type: string
                  description: |
                    The IP address of the cardholder's device at the time of
                    authentication.
                  example: "192.0.2.1"
  responses:
    "200":
      description: Challenge outcome submitted successfully.
    "400":
      description: Request fields are invalid.
      content:
        application/json:
          schema:
            $ref: "../../models/api-error-400.yaml"
    "403":
      description: No Authorization to access resource.
      content:
        application/json:
          schema:
            $ref: "../../models/api-error-403.yaml"
