post:
  tags:
    - payments
  summary: Submit 3DS Challenge Outcome
  operationId: submit-3ds-challenge-outcome
  description: |
    Submit the outcome of a 3DS Strong Customer Authentication (SCA) challenge.
    Call this endpoint after presenting the cardholder with the challenge received
    via the [Payment 3DS SCA Challenge](/api-reference/webhook-topics/payment-3ds-sca-challenge/) webhook,
    to approve or decline the transaction on their behalf.
  parameters:
    - name: challengeId
      in: path
      description: |
        The Immersve ID for the 3DS challenge, as received in the
        [Payment 3DS SCA Challenge](/api-reference/webhook-topics/payment-3ds-sca-challenge/) webhook payload.
      required: true
      schema:
        type: string
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - outcome
            - authType
            - authenticatedAt
            - metadata
          properties:
            outcome:
              type: string
              description: |
                The cardholder's response to the SCA challenge.
              enum:
                - approved
                - declined
            authType:
              type: string
              description: |
                The authentication method used by the cardholder.
              enum:
                - pin
                - face-id
                - fingerprint
                - device-passcode
            authenticatedAt:
              type: string
              format: date-time
              description: |
                The timestamp when the cardholder completed authentication in UTC.
              example: "2024-01-01T12:00:00Z"
            metadata:
              type: object
              description: |
                Additional context about the app and device used
                during authentication.
              required:
                - appId
                - deviceId
                - ipAddress
              properties:
                appId:
                  type: string
                  description: An ID for the app submitting the outcome.
                  example: "com.example.wallet"
                deviceId:
                  type: string
                  description: |
                    A stable, platform-native ID for the cardholder's device.
                    Should be consistent across sessions and recognisable to
                    the cardholder.
                  example: "FBDDF7E1-7A11-4D4E-9C9B-3D8E5C2F1A4B"
                ipAddress:
                  type: string
                  description: The IP address of the cardholder's device.
                  example: "192.0.2.1"
  responses:
    "200":
      description: Challenge outcome submitted successfully.
    "400":
      description: Request fields are invalid.
      content:
        application/json:
          schema:
            $ref: "../../models/api-error-400.yaml"
    "403":
      description: No Authorization to access resource.
      content:
        application/json:
          schema:
            $ref: "../../models/api-error-403.yaml"
