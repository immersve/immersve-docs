type: object
required:
  - id
  - accountId
  - status
  - scope
  - type
  - reason
  - initiator
properties:
  id:
    type: string
    description: Identifier of the block
    example: 75a7e8ef0d234d0a6bf755e07d39eb03
  accountId:
    type: string
    description: Identifier of the cardholder account associated with the block
    example: 9b7552cf9abab0f2efed72df6b3ce4bc
  cardId:
    type: string
    description: Optional. Primary identifier of the card (present when scope is card)
    example: 91ad6fea3b52ca58d60d7fd310f789ec
  status:
    type: string
    description: |
      Current status of the block. May include the following values:
      `creating`,
      `created`,
      `releasing`,
      `released`.
  scope:
    type: string
    description: |
      Scope of the block, indicating whether it applies to the cardholder or a
      specific card. May include the following values:
      `card`,
      `cardholder`.
  type:
    type: string
    description: |
      Type of block applied. May include the following values:
      `card-suspension`,
      `cardholder-activation`,
      `cardholder-suspension`.
  reason:
    type: string
    description: |
      Reason the block was created. May include the following values:
      `activation`,
      `deactivation`,
      `fraud`,
      `kyc`,
      `loststolen`,
      `suspended`,
      `system`,
      `termination`.
  initiator:
    type: string
    description: |
      Entity that initiated the block. May include the following values:
      `system`,
      `partner`,
      `user`.
  createdAt:
    type: string
    description: Timestamp of block creation
    example: "2026-01-15T10:30:00.000Z"
