post:
  tags:
    - card
  summary: Activate Card
  operationId: activate-card
  description: Activate a physical card.
  parameters:
    - $ref: "../../models/card-id-path.yaml"
  responses:
    "200":
      description: Successful operation
    "403":
      description: |
        **FORBIDDEN**
        The card or cardholder does not exist or the user has insufficient permissions.

        **LIVENESS_MISMATCH**
        Resource liveness does not match request liveness.

        **CARD_ACTIVATION_FORBIDDEN**
        Card activation is only allowed for shipped physical cards that are provisioned, not blocked, and not expired.
      content:
        application/json:
          schema:
            $ref: "../../models/api-error-403.yaml"
