allOf:
  - $ref: "./card-summary.yaml"
  - type: object
    properties:
      cardholderName:
        type: string
        description: |
          The cardholder's name as it should be displayed when adding the card
          to a digital wallet. Use as the `cardholderName` when constructing
          an Apple Pay `PKAddPaymentPassRequestConfiguration`.

          Only returned by the Get Card endpoint, not when listing cards.
        example: John Doe
